# Octozine config — change values below to make this fork yours.

schedule: weekly                # weekly | daily | "0 9 * * 1" cron
languages: [zh, en]
github_username: yourname

profile:
  # On first run with no profile.yaml present, octozine auto-generates one from your starred repos.
  # Set this to `true` to force a refresh on the next run; it will be flipped back automatically.
  regenerate: false

llm:
  # Built-in providers (one line switches base_url + default model):
  #   openai | deepseek | moonshot | qwen | zhipu | groq | ollama
  # For anything else, set `provider: custom` and supply `base_url` + `model` below.
  provider: deepseek

  # Optional — override the provider's default model.
  # Leave commented to use the registered default (see README provider table).
  # Each provider's official model list (verified 2026-05):
  #   openai   → https://platform.openai.com/docs/models                                        default: gpt-5.4-mini
  #   deepseek → https://api-docs.deepseek.com/quick_start/pricing                              default: deepseek-v4-flash
  #   moonshot → https://platform.kimi.com/docs/api/chat                                        default: moonshot-v1-128k
  #   qwen     → https://help.aliyun.com/zh/model-studio/getting-started/models                 default: qwen-plus
  #   zhipu    → https://docs.bigmodel.cn/cn/guide/models/text/glm-4.7                          default: glm-4.5-air
  #   groq     → https://console.groq.com/docs/models                                           default: llama-3.1-8b-instant
  # model: deepseek-v4-pro

  # base_url is also overridable (only needed for `provider: custom` or self-hosted gateways):
  # base_url: https://your-endpoint.example/v1

  # API key goes in GitHub Secrets as LLM_API_KEY.

sources:
  trending:
    enabled: true
    langs: [rust, python, typescript, go]
    window: weekly
  search:
    enabled: true
    queries:
      # `{-Nd}` is substituted with `today - N days` (ISO date)
      - "topic:llm stars:>100 created:>{-30d}"
      - "topic:cli language:rust pushed:>{-7d}"
  hn:
    enabled: true
    min_score: 100
  events:
    # Tracks repos starred by accounts you follow on GitHub.
    # Requires a GH_TOKEN secret (see docs/setup.md).
    enabled: false

outputs:
  pages: { enabled: true }
  rss:   { enabled: true }              # always-on if Pages is on; serves at /feed.xml
  telegram:
    enabled: false
    chat_id: ""                         # set chat_id; bot token goes in TELEGRAM_BOT_TOKEN secret
  email:
    enabled: false
    to: ""                              # recipient; SMTP creds in secrets (see docs/setup.md)

top_n: 5
hero_n: 1
history_window: 4               # number of past issues whose repos are excluded from this run
