name: Octozine Daily

on:
  schedule:
    - cron: "0 9 * * 1"          # weekly Monday 09:00 UTC; change via `npm run sync-cron`
  workflow_dispatch:
    inputs:
      skip_pipeline:
        description: "Skip pipeline & commit-back; only rebuild + deploy site (zero LLM cost)"
        type: boolean
        default: false

permissions:
  contents: write                # commit data/ back
  pages: write                   # deploy to GitHub Pages
  id-token: write                # required by deploy-pages

concurrency:
  group: pages
  cancel-in-progress: false

env:
  # Opt actions/* (checkout, setup-node, configure-pages, deploy-pages, etc.)
  # into Node 24 ahead of GitHub's 2026-06-02 default switch — silences the
  # Node 20 deprecation warning. See https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  run:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0          # need history so commit-back rebases cleanly

      - name: Verify LLM_API_KEY
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
        run: |
          if [ -z "$LLM_API_KEY" ]; then
            echo "::error::LLM_API_KEY secret is not set. Add it under repo Settings → Secrets and variables → Actions."
            exit 1
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            package-lock.json
            web/package-lock.json

      - name: Install root deps
        run: npm ci

      - name: Test root
        run: npm test

      - name: Typecheck root
        run: npm run typecheck

      - name: Run pipeline
        if: ${{ inputs.skip_pipeline != true }}
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          # GH_TOKEN raises GitHub REST rate limit (60 → 5000 req/h) for hn enrichment
          # and is required if you enable the `events` source. See docs/setup.md.
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: npm run pipeline

      - name: Commit new issue data
        if: ${{ inputs.skip_pipeline != true }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- data/ config/profile.yaml config/config.yaml; then
            echo "no data/ or config/ changes to commit"
            exit 0
          fi
          git add data/
          # M6: profile auto-gen may rewrite profile.yaml and flip regenerate flag
          if [ -f config/profile.yaml ]; then git add config/profile.yaml; fi
          if [ -f config/config.yaml ];  then git add config/config.yaml;  fi
          slug=$(git diff --staged --name-only -- data/issues/ | grep -oE '[0-9]{4}-W[0-9]{2}' | head -1)
          slug=${slug:-untitled}
          git commit -m "data: issue ${slug} [skip ci]"
          git push

      - name: Install web deps
        working-directory: web
        run: npm ci

      - name: Build site
        working-directory: web
        run: npm run build

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./web/dist

      - name: Deploy to Pages
        id: deploy
        uses: actions/deploy-pages@v4

      - name: Push (telegram / email)
        if: success()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
        run: npm run push
        continue-on-error: true       # site is already deployed; push failures must not block commit-back
